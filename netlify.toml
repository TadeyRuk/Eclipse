[build]
  command = "mkdir -p apps/web/public/zk && rm -rf apps/web/public/zk/eclipse && cp -a contracts/managed/eclipse apps/web/public/zk/eclipse && npm run build --workspace=@eclipse/web"
  publish = "apps/web/dist"

[build.environment]
  NODE_VERSION = "22"
  VITE_NETWORK = "preprod"
  VITE_CONTRACT_ADDRESS = "3aec836e6c723531cb13803e63795d531117c73231fa7793372c504a8bfa3d47"
  VITE_PROOF_SERVER_URL = "http://127.0.0.1:6300"
  VITE_DEBUG = "0"
  VITE_USE_CHAIN = "1"

[[redirects]]
  from = "/zk/*"
  to = "/zk/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
